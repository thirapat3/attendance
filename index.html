<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>หมูดีใจ</title>
    </head>
    <body>


     <!-- GPS Status -->
      <div class="gps-row">
        <div class="gps-dot" id="gps-dot"></div>
         <span id="userId">กำลังตรวจสอบ รหัส...</span>
        <span id="gps-text">กำลังตรวจสอบ GPS...</span>
      </div>
      
        <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
       <script>
async function main() {

    await liff.init({ liffId: "2009304756-ejxgoPFT" });

    if (!liff.isLoggedIn()) {
        liff.login();
        return;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    const text = document.getElementById('gps-text');
    const userId_text = document.getElementById('userId');
    const dot = document.getElementById('gps-dot');

    userId_text.textContent = "LINE ID: " + userId;

    navigator.geolocation.watchPosition(
        (pos) => {

            const gpsCoords = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };

            dot.className = 'gps-dot active';
            text.textContent = `GPS ✓ (${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)})`;

            console.log("Lat:", gpsCoords.lat);
            console.log("Lng:", gpsCoords.lng);

        },
        (err) => {
            dot.className = 'gps-dot error';
            text.textContent = 'ไม่สามารถดึง GPS ได้ — กรุณาเปิดการระบุตำแหน่ง';
            console.error(err);
        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

main();
</script>
        
       
    </body>
</html>
