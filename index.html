<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>หมูดีใจ</title>
    </head>
    <body>


     <!-- GPS Status -->
      <div class="gps-row">
        <div class="gps-dot" id="gps-dot"></div>
         <span id="userId">กำลังตรวจสอบ รหัส...</span>
        <span id="gps-text">กำลังตรวจสอบ GPS...</span>
      </div>
      
        <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
       <script>
            async function main() {
                await liff.init({ liffId: "2007979320-mLxrQM9P" })
                const profile = await liff.getProfile()
                var userId = profile.userId
                var pictureUrl = profile.pictureUrl
                  
            const text = document.getElementById('gps-text');
            const userId_text = document.getElementById('userId');

            userId_text.textContent = userId;   

              
             navigator.geolocation.watchPosition(
                  (pos) => {
                    gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    dot.className  = 'gps-dot active';
                    text.textContent = `GPS ✓ (${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)})`;
                   
                  },
                  () => {
                    dot.className  = 'gps-dot error';
                    text.textContent = 'ไม่สามารถดึง GPS ได้ — กรุณาเปิดการระบุตำแหน่ง';
                  },
                  { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );

              
            }
            main()

           
        </script>  
        
       
    </body>
</html>
